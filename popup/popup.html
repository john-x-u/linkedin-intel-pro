<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkedIn Intel Pro</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>LinkedIn Intel Pro</h1>
        <div class="header-actions">
          <button id="saved-btn" class="icon-btn" title="Saved Reports">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
          </button>
          <button id="settings-btn" class="icon-btn" title="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Main View -->
      <div id="main-view">
        <div class="input-group">
          <label for="project-input">What's your purpose of researching or connecting with this person?</label>
          <textarea
            id="project-input"
            placeholder="e.g., Selling a cybersecurity product to enterprise CISOs, hiring a VP of Engineering, raising a Series A, finding advisors for an AI startup..."
            rows="3"
          ></textarea>
        </div>

        <button id="analyze-btn" class="primary-btn">
          <span id="btn-text">Analyze Profile</span>
          <span id="btn-spinner" class="spinner hidden"></span>
        </button>

        <button id="intel-map-btn" class="primary-btn beta-btn hidden">
          <span id="intel-btn-text">Build Intel Map</span>
          <span id="intel-btn-spinner" class="spinner hidden"></span>
          <span class="beta-badge">BETA</span>
        </button>

        <div id="error-msg" class="error hidden"></div>

        <div id="results" class="results hidden">
          <div class="results-header">
            <h2 id="profile-name"></h2>
            <div class="results-actions">
              <button id="copy-btn" class="action-btn" title="Copy Markdown to clipboard">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                  <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                </svg>
                <span id="copy-text">Copy</span>
              </button>
              <button id="export-btn" class="action-btn" title="Export as Markdown">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                </svg>
                Export .md
              </button>
            </div>
          </div>
          <div id="report-content" class="report-content"></div>
        </div>

        <div id="intel-map-results" class="intel-map hidden"></div>
      </div>

      <!-- Saved Reports View -->
      <div id="saved-view" class="hidden">
        <div class="saved-view-header">
          <button id="saved-back-btn" class="icon-btn" title="Back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
          </button>
          <h2>Saved Reports <span id="saved-count" class="saved-count"></span></h2>
          <button id="download-all-btn" class="action-btn hidden" title="Download all reports as Markdown">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            Download All .md
          </button>
        </div>
        <div id="saved-list" class="saved-list"></div>
        <div id="saved-empty" class="saved-empty">No saved reports yet. Analyze a profile to get started.</div>
      </div>
    </div>
    <!-- Processing overlay -->
    <div id="processing-overlay" class="processing-overlay hidden">
      <div class="processing-content">
        <div class="processing-spinner"></div>
        <div id="processing-text" class="processing-text">Processing...</div>
        <div class="processing-hint">Please wait while the browser is working</div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
