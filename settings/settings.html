<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkedIn Analyzer - Settings</title>
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body>
    <div class="container">
      <h1>LinkedIn Analyzer Settings</h1>

      <div class="form-group">
        <label for="provider-select">AI Provider</label>
        <select id="provider-select">
          <option value="openai">OpenAI</option>
          <option value="anthropic">Anthropic</option>
          <option value="google">Google</option>
        </select>
      </div>

      <div class="form-group">
        <label for="model-select">Model</label>
        <select id="model-select"></select>
      </div>

      <div class="form-group">
        <label for="api-key" id="api-key-label">API Key</label>
        <div class="input-wrapper">
          <input
            type="password"
            id="api-key"
            placeholder=""
            autocomplete="off"
          />
          <button id="toggle-key" class="toggle-btn" title="Show/hide key">
            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <p class="help-text" id="help-text">
          Get your API key from
          <a id="help-link" href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com</a>
        </p>
      </div>

      <button id="save-btn" class="primary-btn">Save Settings</button>

      <div id="status-msg" class="status hidden"></div>
    </div>
    <script src="settings.js"></script>
  </body>
</html>
